<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Klean Ventz CRM</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/dist/tabler-icons.min.css">
<style>
:root{
--font-sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
--color-text-primary:#1A1A18;--color-text-secondary:#6B6B66;--color-text-tertiary:#9A9A93;--color-text-info:#185FA5;
--color-background-primary:#FFFFFF;--color-background-secondary:#F5F4EF;--color-background-tertiary:#FAFAF7;
--color-border-tertiary:#E8E6DF;--color-border-secondary:#D6D3CA;
--border-radius-md:8px;--border-radius-lg:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary)}
.app{display:flex;height:100vh;min-height:600px;background:var(--color-background-tertiary)}
.sidebar{width:210px;flex-shrink:0;background:var(--color-background-primary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;padding:0}
.sidebar-logo{padding:14px 16px 12px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px}
.sidebar-logo img{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;background:#fff}
.sidebar-logo-text h1{font-size:13px;font-weight:500;line-height:1.2}
.sidebar-logo-text p{font-size:10px;color:var(--color-text-secondary);margin-top:1px}
.sidebar-logo-text span{font-size:10px;color:var(--color-text-tertiary)}
.nav-section{padding:8px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;font-size:13px;color:var(--color-text-secondary)}
.nav-item:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.nav-item.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.nav-item i{font-size:16px}
.nav-bottom{padding:8px 0;border-top:0.5px solid var(--color-border-tertiary)}
.main{flex:1;overflow:auto;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h2{font-size:16px;font-weight:500}
.content{padding:20px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;font-size:13px;cursor:pointer;color:var(--color-text-primary);text-decoration:none}
.btn:hover{background:var(--color-background-secondary)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.btn-primary:hover{opacity:.85}
.btn-success{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-success:hover{opacity:.85}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 20px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 16px}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-val{font-size:22px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 12px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);font-size:12px}
td{padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-flex;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-gray{background:#F1EFE8;color:#5F5E5A}
.badge-red{background:#FCEBEB;color:#A32D2D}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
label{font-size:12px;color:var(--color-text-secondary);font-weight:500}
input,select,textarea{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);font-size:13px;color:var(--color-text-primary);font-family:var(--font-sans)}
textarea{resize:vertical;min-height:72px}
.section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;padding-bottom:6px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:6px}
.section-title.flush{border:none;margin:0;padding:0}
.avatar{width:36px;height:36px;border-radius:50%;background:#CECBF6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#3C3489;flex-shrink:0}
.avatar.sm{width:32px;height:32px;font-size:11px}
.row-link{cursor:pointer}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);width:600px;max-height:92vh;overflow-y:auto;border:0.5px solid var(--color-border-tertiary)}
.modal-header{padding:16px 20px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--color-background-primary);z-index:1}
.modal-body{padding:20px}
.modal-footer{padding:12px 20px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--color-background-primary)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--color-text-primary);color:var(--color-background-primary);padding:10px 16px;border-radius:var(--border-radius-md);font-size:13px;z-index:200;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.service-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:6px;font-size:13px}
.service-item input[type=checkbox]{width:auto;flex-shrink:0}
.surcharge-box{background:#FAEEDA;border:0.5px solid #EF9F27;border-radius:var(--border-radius-md);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:12px}
.surcharge-box label{color:#854F0B;font-size:12px;font-weight:500;margin:0}
.history-item{display:flex;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.history-item:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;background:#1D9E75;margin-top:5px;flex-shrink:0}
.dot.amber{background:#EF9F27}
.task-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.task-row:last-child{border-bottom:none}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{padding:8px 4px;text-align:center;font-size:12px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid transparent;min-height:38px}
.cal-day:hover{background:var(--color-background-secondary)}
.cal-day.has-job{background:#E6F1FB;color:#185FA5;font-weight:500;border-color:#B5D4F4}
.cal-day.today{border-color:var(--color-text-primary)}
.cal-day.header{font-weight:500;color:var(--color-text-secondary);cursor:default;background:transparent;min-height:auto;padding:4px}
.cal-day.header:hover{background:transparent}
.payment-opts{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.payment-opt{padding:6px 12px;border:0.5px solid var(--color-border-secondary);border-radius:20px;font-size:12px;cursor:pointer;background:var(--color-background-primary)}
.payment-opt.selected{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.addr-suggestions{position:absolute;top:100%;left:0;right:0;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);z-index:50}
.addr-suggestion{padding:9px 12px;font-size:13px;cursor:pointer;border-bottom:0.5px solid var(--color-border-tertiary)}
.addr-suggestion:last-child{border-bottom:none}
.addr-suggestion:hover{background:var(--color-background-secondary)}
.addr-suggestion .main-text{font-weight:500}
.addr-suggestion .sub-text{font-size:11px;color:var(--color-text-secondary)}
.addr-wrap{position:relative}
.optional-tag{font-size:10px;font-weight:400;color:var(--color-text-tertiary);margin-left:4px;text-transform:none;letter-spacing:0}
.empty{text-align:center;padding:24px;color:var(--color-text-secondary);font-size:13px}
.empty i{font-size:28px;color:#1D9E75;display:block;margin-bottom:8px}
@media print{
 body *{visibility:hidden!important}
 #modal-container,#modal-container *{visibility:visible!important}
 #modal-container{position:absolute!important;inset:0!important}
 #modal-container .modal-bg{background:#fff!important;position:static!important;display:block!important;padding:0!important}
 #modal-container .modal{box-shadow:none!important;border:none!important;max-height:none!important;width:100%!important;border-radius:0!important;overflow:visible!important}
 .no-print{display:none!important}
}

table input{padding:5px 8px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="sidebar">
    <div class="sidebar-logo">
      <img id="logo-img" alt="Klean Ventz logo">
      <div class="sidebar-logo-text">
        <h1>Klean Ventz</h1>
        <p id="sidebar-sub">Residential · New Jersey</p>
        <span>kleanventz.com</span>
      </div>
    </div>
    <div style="padding:10px 12px;border-bottom:0.5px solid var(--color-border-tertiary)">
      <label style="font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.05em">Location</label>
      <select id="loc-select" onchange="switchLocation(this.value)" style="margin-top:4px"><option value="nj">New Jersey — Residential</option><option value="mw">Midwest — Commercial</option></select>
      <div style="font-size:10px;color:var(--color-text-tertiary);margin-top:4px"><i class="ti ti-lock" style="font-size:10px"></i> Owner only</div>
    </div>
    <div class="nav-section">
      <div class="nav-item active" onclick="showView('dashboard')" id="nav-dashboard"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
      <div class="nav-item" onclick="showView('customers')" id="nav-customers"><i class="ti ti-users"></i> Customers</div>
      <div class="nav-item" onclick="showView('jobs')" id="nav-jobs"><i class="ti ti-clipboard-list"></i> Jobs</div>
      <div class="nav-item" onclick="showView('calendar')" id="nav-calendar"><i class="ti ti-calendar"></i> Calendar</div>
      <div class="nav-item" onclick="showView('financials')" id="nav-financials"><i class="ti ti-chart-bar"></i> Financials</div>
      <div class="nav-item" onclick="showView('catalog')" id="nav-catalog"><i class="ti ti-package"></i> Services &amp; Products</div>
    </div>
    <div class="nav-bottom">
      <div class="nav-item" onclick="showView('settings')" id="nav-settings"><i class="ti ti-settings"></i> Settings</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar"><h2 id="page-title">Dashboard</h2><div id="topbar-actions"></div></div>
    <div class="content" id="content"></div>
  </div>
</div>
<div id="modal-container"></div>
<div class="toast" id="toast"></div>

function nameOf(c){return ((c.firstName||'')+' '+(c.lastName||'')).trim()||c.contactName||'Customer';}
function hasScheduledJob(id){return jobs.some(j=>j.customerId===id&&j.status==='scheduled');}
function hasReminder(id){return reminders.some(r=>r.customerId===id);}

function getDashboardTasks(){
  const today=dOff(0);const out=[];
  reminders.forEach(r=>{if(r.dueDate>today)return;const c=customers.find(x=>x.id===r.customerId);if(!c||hasScheduledJob(c.id))return;out.push({kind:'followup',customer:c,date:r.dueDate,reason:r.reason,reminderId:r.id});});
  customers.forEach(c=>{if(!c.nextDue)return;if(addDays(c.nextDue,-7)>today)return;if(hasScheduledJob(c.id))return;if(c.snoozeUntil&&c.snoozeUntil>today)return;if(hasReminder(c.id))return;out.push({kind:'service',customer:c,date:c.nextDue,reason:'Service due'});});
  return out.sort((a,b)=>a.date>b.date?1:-1);
}
function getUpcoming(){
  const today=dOff(0),horizon=addDays(today,30);const out=[];
  reminders.forEach(r=>{if(r.dueDate<=today||r.dueDate>horizon)return;const c=customers.find(x=>x.id===r.customerId);if(!c||hasScheduledJob(c.id))return;out.push({kind:'followup',customer:c,date:r.dueDate,reason:r.reason});});
  customers.forEach(c=>{if(!c.nextDue)return;const trig=addDays(c.nextDue,-7);if(trig<=today||trig>horizon)return;if(hasScheduledJob(c.id))return;if(hasReminder(c.id))return;out.push({kind:'service',customer:c,date:c.nextDue,reason:'Service due'});});
  return out.sort((a,b)=>a.date>b.date?1:-1);
}

function showView(v){currentView=v;
  const titles={dashboard:'Dashboard',customers:'Customers',jobs:'Jobs',calendar:'Calendar',financials:'Financials',catalog:'Services & Products',settings:'Settings'};
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const nav=document.getElementById('nav-'+v);if(nav)nav.classList.add('active');
  document.getElementById('page-title').textContent=titles[v]||v;
  const actions={
    customers:'<button class="btn btn-primary" onclick="openNewCustomer()"><i class="ti ti-plus"></i> New customer</button>',
    jobs:'<button class="btn btn-primary" onclick="openScheduleJob()"><i class="ti ti-plus"></i> Schedule job</button>',
    dashboard:'',calendar:'',settings:''
  };
  document.getElementById('topbar-actions').innerHTML=actions[v]||'';
  const views={dashboard:renderDashboard,customers:renderCustomers,jobs:renderJobs,calendar:renderCalendar,financials:renderFinancials,catalog:renderCatalog,settings:renderSettings};
  document.getElementById('content').innerHTML=(views[v]||renderDashboard)();
}

  <div class="grid2">
    <div class="card">
      <div class="section-title flush" style="margin-bottom:12px"><i class="ti ti-calendar-event"></i> Today\u2019s jobs</div>
      ${todayJobs.length?todayJobs.map(j=>`<div class="row-link" onclick="openJob(${j.id})" style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)"><div><div style="font-weight:500;font-size:13px">${j.customerName}</div><div style="font-size:12px;color:var(--color-text-secondary)">${j.time} \u00b7 ${SERVICES.find(s=>s.id===j.services[0])?.name||''}</div></div><span class="badge ${j.status==='completed'?'badge-green':'badge-blue'}">${j.status}</span></div>`).join(''):'<p style="font-size:13px;color:var(--color-text-secondary)">No jobs scheduled today</p>'}
    </div>
    <div class="card">
      <div class="section-title flush" style="margin-bottom:12px"><i class="ti ti-clock"></i> Coming up (next 30 days)</div>
      ${upcoming.length?upcoming.map(t=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)"><div style="font-size:13px;font-weight:500">${nameOf(t.customer)}</div><div style="font-size:12px;color:var(--color-text-secondary)">${t.kind==='service'?'Due':'Callback'} ${fmtDate(t.date)}</div></div>`).join(''):'<p style="font-size:13px;color:var(--color-text-secondary)">Nothing coming up in the next 30 days</p>'}

function taskRow(t){
  const c=t.customer,today=dOff(0);
  let badge,badgeClass;
  if(t.kind==='service'){
    const days=Math.round((new Date(today)-new Date(c.nextDue))/86400000);
    if(c.nextDue<today){badge='Overdue '+days+'d';badgeClass='badge-red';}
    else if(c.nextDue===today){badge='Due today';badgeClass='badge-amber';}
    else{badge='Due in '+Math.abs(days)+'d';badgeClass='badge-amber';}
  } else {badge=t.reason;badgeClass='badge-blue';}
  const phoneDigits=c.phone.replace(/[^0-9]/g,'');
  const sub=t.kind==='service'?`${c.phone} \u00b7 Last cleaned ${fmtDate(c.lastService)}`:`${c.phone} \u00b7 ${t.reason}`;
  return `<div class="task-row"><div class="avatar" onclick="openCustomer(${c.id})" style="cursor:pointer">${initials(c)}</div><div style="flex:1;min-width:0;cursor:pointer" onclick="openCustomer(${c.id})"><div style="font-weight:500;font-size:14px">Call ${nameOf(c)}${c.isCompany&&c.contactName?' \u00b7 '+c.contactName:''}</div><div style="font-size:12px;color:var(--color-text-secondary)">${sub}</div></div><span class="badge ${badgeClass}">${badge}</span><div style="display:flex;gap:6px;flex-shrink:0"><a class="btn btn-sm" href="tel:${phoneDigits}"><i class="ti ti-phone"></i> Call</a><button class="btn btn-sm btn-primary" onclick="openScheduleJobForCustomer(${c.id})"><i class="ti ti-calendar-plus"></i> Book</button><button class="btn btn-sm" onclick="openLogOutcome(${c.id},${t.reminderId||'null'})"><i class="ti ti-dots"></i> Log</button></div></div>`;
}

function openLogOutcome(custId,reminderId){
  const c=customers.find(x=>x.id===custId);if(!c)return;
  showModal(`<div class="modal-header"><h3 style="font-size:15px;font-weight:500">Log call \u2014 ${nameOf(c)}</h3><button class="btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body">
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:16px">What happened on this call?</p>
    <div class="service-item" style="cursor:pointer;padding:12px 14px" onclick="logNoAnswer(${custId},${reminderId||'null'})"><i class="ti ti-phone-x" style="font-size:18px;color:#854F0B"></i><div><div style="font-weight:500;color:var(--color-text-primary)">No answer / left voicemail</div><div style="font-size:12px;color:var(--color-text-secondary)">Sets a follow-up reminder for one week from today</div></div></div>
    <div class="service-item" style="cursor:pointer;padding:12px 14px;align-items:flex-start" onclick="document.getElementById('cb-wrap').style.display='block'"><i class="ti ti-calendar-clock" style="font-size:18px;color:#185FA5;margin-top:2px"></i><div style="flex:1"><div style="font-weight:500;color:var(--color-text-primary)">Call back later</div><div style="font-size:12px;color:var(--color-text-secondary)">Customer asked you to reach out on a specific date</div><div id="cb-wrap" style="display:none;margin-top:10px"><input type="date" id="cb-date" value="${addDays(dOff(0),180)}" style="margin-bottom:8px"><button class="btn btn-sm btn-primary" onclick="logCallback(${custId},${reminderId||'null'})">Set callback reminder</button></div></div></div>
    <div class="service-item" style="cursor:pointer;padding:12px 14px" onclick="closeModal();openScheduleJobForCustomer(${custId})"><i class="ti ti-calendar-check" style="font-size:18px;color:#1D9E75"></i><div><div style="font-weight:500;color:var(--color-text-primary)">Ready to schedule</div><div style="font-size:12px;color:var(--color-text-secondary)">Book the job now</div></div></div>
    <div style="margin-top:6px;text-align:center"><button class="btn btn-sm" onclick="logDismiss(${custId},${reminderId||'null'})" style="color:var(--color-text-secondary)">Dismiss for now</button></div>
  </div>`);
}
function upsertReminder(custId,dueDate,reason,reminderId){
  if(reminderId){const r=reminders.find(x=>x.id===reminderId);if(r){r.dueDate=dueDate;r.reason=reason;return;}}
  const existing=reminders.find(x=>x.customerId===custId);
  if(existing){existing.dueDate=dueDate;existing.reason=reason;}
  else reminders.push({id:nextReminderId++,customerId:custId,dueDate,reason});
}
function logNoAnswer(custId,reminderId){upsertReminder(custId,addDays(dOff(0),7),'Left voicemail \u2014 follow up',reminderId);const c=customers.find(x=>x.id===custId);if(c)c.snoozeUntil='';closeModal();toast('Follow-up set for '+fmtDate(addDays(dOff(0),7)));showView('dashboard');}
function logCallback(custId,reminderId){const d=document.getElementById('cb-date').value;if(!d)return toast('Pick a date');upsertReminder(custId,d,'Callback \u2014 customer requested',reminderId);const c=customers.find(x=>x.id===custId);if(c)c.snoozeUntil='';closeModal();toast('Callback reminder set for '+fmtDate(d));showView('dashboard');}
function logDismiss(custId,reminderId){if(reminderId){reminders=reminders.filter(r=>r.id!==reminderId);}else{const c=customers.find(x=>x.id===custId);if(c)c.snoozeUntil=addDays(dOff(0),30);}closeModal();toast('Dismissed');showView('dashboard');}

let calMode='month';
let calDate=dOff(0);
function renderCalendar(){return calMode==='day'?renderDaySchedule():calMode==='week'?renderWeek():renderMonth();}
function setCalMode(m){calMode=m;document.getElementById('content').innerHTML=renderCalendar();}
function openCalDay(key){calDate=key;calMode='day';document.getElementById('content').innerHTML=renderCalendar();}
function calNavDay(delta){calDate=addDays(calDate,delta);document.getElementById('content').innerHTML=renderCalendar();}
function calNavWeek(delta){calDate=addDays(calDate,7*delta);document.getElementById('content').innerHTML=renderCalendar();}
function calNavMonth(delta){const p=calDate.split('-');const d=new Date(+p[0],+p[1]-1+delta,1);calDate=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-01`;document.getElementById('content').innerHTML=renderCalendar();}
function calToday(){calDate=dOff(0);document.getElementById('content').innerHTML=renderCalendar();}
function calToggle(active){const m=[['month','Month'],['week','Week'],['day','Day']];return m.map(x=>`<button class="btn btn-sm ${active===x[0]?'btn-primary':''}" onclick="setCalMode('${x[0]}')">${x[1]}</button>`).join('');}
function weekStartKey(key){const p=key.split('-');const d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()-d.getDay());return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function renderMonth(){
  const p=calDate.split('-');const year=+p[0],month=+p[1]-1;const todayKey=dOff(0);
  const monthName=['January','February','March','April','May','June','July','August','September','October','November','December'][month];
  const firstDay=new Date(year,month,1).getDay();const daysInMonth=new Date(year,month+1,0).getDate();
  const prefix=`${year}-${String(month+1).padStart(2,'0')}-`;
  const jobDates={};jobs.forEach(j=>{if(j.date.startsWith(prefix)){const d=parseInt(j.date.slice(8,10));jobDates[d]=(jobDates[d]||0)+1;}});
  let cells='';['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{cells+='<div class="cal-day header">'+d+'</div>';});
  for(let i=0;i<firstDay;i++)cells+='<div class="cal-day"></div>';
  for(let d=1;d<=daysInMonth;d++){const key=prefix+String(d).padStart(2,'0');const hasJob=jobDates[d];cells+=`<div class="cal-day${hasJob?' has-job':''}${key===todayKey?' today':''}" onclick="openCalDay('${key}')">${d}${hasJob?`<div style="font-size:9px;margin-top:1px">${hasJob} job${hasJob>1?'s':''}</div>`:''}</div>`;}
  return `<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:6px"><button class="btn btn-sm" onclick="calNavMonth(-1)"><i class="ti ti-chevron-left"></i></button><h3 style="font-size:15px;font-weight:500;min-width:130px;text-align:center">${monthName} ${year}</h3><button class="btn btn-sm" onclick="calNavMonth(1)"><i class="ti ti-chevron-right"></i></button><button class="btn btn-sm" onclick="calToday()">Today</button></div><div style="display:flex;gap:6px">${calToggle('month')}</div></div><div class="cal-grid">${cells}</div><p style="font-size:12px;color:var(--color-text-secondary);margin-top:12px;text-align:center">Tap any day to open its daily schedule.</p></div>`;
}
function layoutDay(dayJobs){
  const evs=dayJobs.map(j=>{const p=j.time.split(':');const start=(+p[0])*60+(+(p[1]||0));return{job:j,start,end:start+120};}).sort((a,b)=>a.start-b.start||a.end-b.end);
  let i=0;
  while(i<evs.length){let clusterEnd=evs[i].end;let k=i+1;while(k<evs.length&&evs[k].start<clusterEnd){clusterEnd=Math.max(clusterEnd,evs[k].end);k++;}const cluster=evs.slice(i,k);const cols=[];cluster.forEach(e=>{let placed=false;for(let c=0;c<cols.length;c++){if(cols[c]<=e.start){e.col=c;cols[c]=e.end;placed=true;break;}}if(!placed){e.col=cols.length;cols.push(e.end);}});cluster.forEach(e=>e.cols=cols.length);i=k;}
  return evs;
}
function renderDaySchedule(){
  const key=calDate;const dayJobs=jobs.filter(j=>j.date===key);
  const H0=7,H1=20,HH=58,GUT=54;

  let blocks='';
  evs.forEach(e=>{const j=e.job;const c=customers.find(x=>x.id===j.customerId)||{};const top=Math.max(0,((e.start-H0*60)/60)*HH);const height=(120/60)*HH-4;const leftCalc=`calc(${GUT}px + (100% - ${GUT}px) * ${e.col/e.cols})`;const widthCalc=`calc((100% - ${GUT}px) * ${1/e.cols} - 6px)`;const color=j.status==='completed'?'#1D9E75':'#185FA5';const bg=j.status==='completed'?'#EAF3DE':'#E6F1FB';blocks+=`<div onclick="openJob(${j.id})" style="position:absolute;top:${top}px;left:${leftCalc};width:${widthCalc};height:${height}px;background:${bg};border-left:3px solid ${color};border-radius:6px;padding:5px 8px;overflow:hidden;cursor:pointer;box-sizing:border-box"><div style="font-size:11px;font-weight:600;color:${color}">${j.time} \u00b7 ${j.status}</div><div style="font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${j.customerName}</div><div style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis"><i class="ti ti-map-pin" style="font-size:11px"></i> ${c.address||'No address'}</div><div style="font-size:11px;color:var(--color-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${j.services.map(s=>svcName(s)).join(', ')}</div></div>`;});
  const totalH=(H1-H0)*HH+10;
  const dp=key.split('-');const dObj=new Date(+dp[0],+dp[1]-1,+dp[2]);const dayName=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dObj.getDay()];
  const isToday=key===dOff(0);
  return `<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:8px"><button class="btn btn-sm" onclick="calNavDay(-1)"><i class="ti ti-chevron-left"></i></button><h3 style="font-size:15px;font-weight:500">${dayName}, ${fmtDate(key)}${isToday?' \u00b7 Today':''}</h3><button class="btn btn-sm" onclick="calNavDay(1)"><i class="ti ti-chevron-right"></i></button></div><div style="display:flex;gap:6px"><button class="btn btn-sm" onclick="calToday()">Today</button>${calToggle('day')}</div></div><div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px">${dayJobs.length} job${dayJobs.length!==1?'s':''} \u00b7 2-hour slots \u00b7 tap a job for full details</div><div style="position:relative;height:${totalH}px;margin-top:4px">${grid}${blocks}</div></div>`;
}
function renderWeek(){
  const start=weekStartKey(calDate);
  const days=[];for(let i=0;i<7;i++)days.push(addDays(start,i));
  const H0=7,H1=20,HH=46,GUT=42,COLW=118;

  let grid='';
  for(let h=H0;h<=H1;h++){const top=(h-H0)*HH;const label=(h%12===0?12:h%12)+(h<12?'a':'p');grid+=`<div style="position:absolute;top:${top}px;left:0;width:${totalW}px;border-top:0.5px solid var(--color-border-tertiary)"></div><div style="position:absolute;top:${top-6}px;left:0;width:${GUT-6}px;text-align:right;font-size:9px;color:var(--color-text-tertiary)">${label}</div>`;}
  let seps='';for(let i=0;i<7;i++){const left=GUT+i*COLW;seps+=`<div style="position:absolute;top:0;bottom:0;left:${left}px;border-left:0.5px solid var(--color-border-tertiary)"></div>`;}
  let blocks='';
  days.forEach((k,di)=>{const dj=jobs.filter(j=>j.date===k);const evs=layoutDay(dj);evs.forEach(e=>{const j=e.job;const top=Math.max(0,((e.start-H0*60)/60)*HH);const height=(120/60)*HH-3;const cw=COLW/e.cols;const left=GUT+di*COLW+e.col*cw+1;const w=cw-3;const color=j.status==='completed'?'#1D9E75':'#185FA5';const bg=j.status==='completed'?'#EAF3DE':'#E6F1FB';blocks+=`<div onclick="openJob(${j.id})" style="position:absolute;top:${top}px;left:${left}px;width:${w}px;height:${height}px;background:${bg};border-left:3px solid ${color};border-radius:5px;padding:3px 5px;overflow:hidden;cursor:pointer;box-sizing:border-box"><div style="font-size:10px;font-weight:600;color:${color};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${j.time}</div><div style="font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${j.customerName}</div></div>`;});});
  return `<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:6px"><button class="btn btn-sm" onclick="calNavWeek(-1)"><i class="ti ti-chevron-left"></i></button><h3 style="font-size:14px;font-weight:500">${fmtDate(start)} \u2013 ${fmtDate(addDays(start,6))}</h3><button class="btn btn-sm" onclick="calNavWeek(1)"><i class="ti ti-chevron-right"></i></button><button class="btn btn-sm" onclick="calToday()">Today</button></div><div style="display:flex;gap:6px">${calToggle('week')}</div></div><div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><div style="min-width:${totalW}px">${header}<div style="position:relative;height:${totalH}px;margin-top:2px">${grid}${seps}${blocks}</div></div></div><p style="font-size:11px;color:var(--color-text-secondary);margin-top:8px;text-align:center">Tap a day to open its full schedule \u00b7 scroll sideways for the whole week.</p></div>`;

let finPeriod='month';
function setFinPeriod(p){finPeriod=p;document.getElementById('content').innerHTML=renderFinancials();}
function weekKey(ds){const d=new Date(ds);const oneJan=new Date(d.getFullYear(),0,1);const days=Math.floor((d-oneJan)/86400000);const wk=Math.ceil((days+oneJan.getDay()+1)/7);return d.getFullYear()+'-W'+String(wk).padStart(2,'0');}
function periodKey(ds,p){const d=new Date(ds);if(p==='week')return weekKey(ds);if(p==='month')return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');if(p==='year')return ''+d.getFullYear();return 'all';}
function periodLabel(key,p){if(p==='all')return 'All time';if(p==='year')return key;if(p==='month'){const a=key.split('-');const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mo[parseInt(a[1])-1]+' '+a[0];}if(p==='week'){const a=key.split('-W');return 'Week '+a[1]+', '+a[0];}return key;}
function renderFinancials(){
  const completed=jobs.filter(j=>j.status==='completed');
  const groups={};
  completed.forEach(j=>{const k=periodKey(j.date,finPeriod);(groups[k]=groups[k]||[]).push(j);});
  const keys=Object.keys(groups).sort().reverse();
  const tabs=[['week','Week'],['month','Month'],['year','Year'],['all','All time']];
  let html=`<div class="card" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"><span style="font-size:12px;color:var(--color-text-secondary);margin-right:4px">Break down by:</span>${tabs.map(t=>`<button class="btn btn-sm ${finPeriod===t[0]?'btn-primary':''}" onclick="setFinPeriod('${t[0]}')">${t[1]}</button>`).join('')}</div>`;
  if(!keys.length){html+='<div class="card"><div class="empty"><i class="ti ti-chart-bar"></i>No completed jobs yet \u2014 your numbers will appear here as you complete jobs.</div></div>';return html;}
  keys.forEach(k=>{
    const arr=groups[k];
    const gross=arr.reduce((s,j)=>s+(j.total||0),0);
    const cost=arr.reduce((s,j)=>s+jobCost(j),0);
    const profit=gross-cost;
    const margin=gross?Math.round(profit/gross*100):0;
    html+=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px"><div style="font-weight:600;font-size:15px">${periodLabel(k,finPeriod)}</div><div style="font-size:12px;color:var(--color-text-secondary)">${arr.length} job${arr.length!==1?'s':''} \u00b7 ${margin}% margin</div></div><div class="grid3"><div class="metric"><div class="metric-label">Gross revenue</div><div class="metric-val">$${gross.toLocaleString()}</div></div><div class="metric"><div class="metric-label">Cost of goods</div><div class="metric-val" style="color:#A32D2D">$${cost.toLocaleString()}</div></div><div class="metric"><div class="metric-label">Profit</div><div class="metric-val" style="color:#1D9E75">$${profit.toLocaleString()}</div></div></div></div>`;
  });
  return html;
}

function openNewCustomer(){
  const leadOpts=LEAD_SOURCES.map(s=>'<option>'+s+'</option>').join('');
  showModal(`<div class="modal-header"><h3 style="font-size:15px;font-weight:500">New customer</h3><button class="btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body">
    <div class="section-title">Account type</div>
    <div class="service-item" style="margin-bottom:14px"><input type="checkbox" id="nc-iscompany"><label for="nc-iscompany" style="font-size:13px;color:var(--color-text-primary);cursor:pointer;margin:0">This is a company / landlord account</label></div>
    <div class="form-group"><label>Company / landlord contact name</label><input type="text" id="nc-contact" placeholder="e.g. Okafor Properties (David)"></div>
    <div class="form-group"><label>Contact phone (for billing)</label><input type="tel" id="nc-contactphone" placeholder="(732) 555-0000"></div>
    <div class="section-title" style="margin-top:8px">Customer</div>
    <div class="form-row"><div class="form-group" style="margin-bottom:0"><label>First name</label><input type="text" id="nc-first" placeholder="Jane"></div><div class="form-group" style="margin-bottom:0"><label>Last name</label><input type="text" id="nc-last" placeholder="Smith"></div></div>
    <div class="form-row" style="margin-top:12px"><div class="form-group" style="margin-bottom:0"><label>Phone number</label><input type="tel" id="nc-phone" placeholder="(732) 555-0000"></div><div class="form-group" style="margin-bottom:0"><label>Second phone <span class="optional-tag">optional</span></label><input type="tel" id="nc-phone2" placeholder="(732) 555-0001"></div></div>
    <div class="form-group" style="margin-top:12px"><label>Email</label><input type="email" id="nc-email" placeholder="jane@email.com"></div>
    <div class="form-group addr-wrap"><label>Address <span style="font-size:10px;color:var(--color-text-tertiary);font-weight:400">(populates from Google Maps)</span></label><input type="text" id="nc-addr" placeholder="123 Main St, City, NJ" autocomplete="off" oninput="addrInput(this.value)" onblur="setTimeout(hideAddrSug,200)"><div id="addr-suggestions" class="addr-suggestions" style="display:none"></div></div>
    <div class="form-group"><label>Lead source (how did you hear about us?)</label><select id="nc-lead"><option value="">\u2014 select \u2014</option>${leadOpts}<option value="other">Other (specify below)</option></select></div>
    <div class="form-group" id="lead-other-wrap" style="display:none"><label>Please specify</label><input type="text" id="nc-lead-other" placeholder="How did they find you?"></div>
    <div class="section-title">Service requested</div>
    ${SERVICES.map(s=>`<div class="service-item"><input type="checkbox" id="ncs-${s.id}"><label for="ncs-${s.id}" style="font-size:13px;color:var(--color-text-primary);cursor:pointer;margin:0">${s.name}</label></div>`).join('')}
    <div class="section-title" style="margin-top:12px">Notes</div>
    <div class="form-group"><textarea id="nc-notes" placeholder="Gate code, dog in yard, access instructions..."></textarea></div>
  </div>
  <div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveNewCustomer()"><i class="ti ti-user-plus"></i> Save customer</button></div>`);
  document.getElementById('nc-lead').addEventListener('change',function(){document.getElementById('lead-other-wrap').style.display=this.value==='other'?'block':'none';});
}
function addrInput(val){const box=document.getElementById('addr-suggestions');if(!box)return;if(val.length<3){box.style.display='none';return;}const filtered=FAKE_ADDRESSES.filter(a=>a.main.toLowerCase().includes(val.toLowerCase())||a.sub.toLowerCase().includes(val.toLowerCase()));if(!filtered.length){box.style.display='none';return;}box.style.display='block';box.innerHTML=filtered.map(a=>`<div class="addr-suggestion" onmousedown="selectAddr('${a.main}, ${a.sub}')"><div class="main-text">${a.main}</div><div class="sub-text">${a.sub}</div></div>`).join('');}
function selectAddr(val){const inp=document.getElementById('nc-addr');if(inp)inp.value=val;hideAddrSug();}
function hideAddrSug(){const box=document.getElementById('addr-suggestions');if(box)box.style.display='none';}
function saveNewCustomer(){
  const firstName=document.getElementById('nc-first').value.trim();const lastName=document.getElementById('nc-last').value.trim();
  const isCompany=document.getElementById('nc-iscompany').checked;const contactName=document.getElementById('nc-contact').value.trim();
  if(!firstName&&!lastName&&!contactName)return toast('Please enter a name');
  const leadVal=document.getElementById('nc-lead').value;const leadSource=leadVal==='other'?(document.getElementById('nc-lead-other').value.trim()||'Other'):leadVal;
  const serviceRequested=SERVICES.filter(s=>document.getElementById('ncs-'+s.id)?.checked).map(s=>s.id);
  customers.push({id:nextCustId++,isCompany,contactName,contactPhone:document.getElementById('nc-contactphone').value,firstName,lastName,phone:document.getElementById('nc-phone').value,phone2:document.getElementById('nc-phone2').value,email:document.getElementById('nc-email').value,address:document.getElementById('nc-addr').value,leadSource,serviceRequested,notes:document.getElementById('nc-notes').value,lastService:'',nextDue:'',nextServiceMonths:12,jobs:0,snoozeUntil:''});
  closeModal();toast('Customer saved');showView('customers');
}

function openCustomer(id){
  const c=customers.find(x=>x.id===id);if(!c)return;
  const cJobs=jobs.filter(j=>j.customerId===id);const phoneDigits=c.phone.replace(/[^0-9]/g,'');
  const openRem=reminders.find(r=>r.customerId===id);
  showModal(`<div class="modal-header"><div style="display:flex;align-items:center;gap:10px"><div class="avatar">${initials(c)}</div><div><h3 style="font-size:15px;font-weight:500">${nameOf(c)}</h3>${c.isCompany?`<p style="font-size:12px;color:var(--color-text-secondary)">${c.contactName||'Company / landlord'}</p>`:''}</div></div><button class="btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body">
    <div style="display:flex;gap:8px;margin-bottom:16px"><a class="btn btn-primary" href="tel:${phoneDigits}" style="flex:1;justify-content:center"><i class="ti ti-phone"></i> Call ${c.phone}</a><button class="btn" onclick="closeModal();openLogOutcome(${c.id},${openRem?openRem.id:'null'})"><i class="ti ti-notes"></i> Log call</button></div>
    ${openRem?`<div style="background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:var(--border-radius-md);padding:8px 12px;margin-bottom:14px;font-size:12px;color:#185FA5"><i class="ti ti-bell"></i> Reminder set: ${openRem.reason} \u2014 ${fmtDate(openRem.dueDate)}</div>`:''}
    <div class="grid3" style="margin-bottom:16px"><div class="metric"><div class="metric-label">Total jobs</div><div class="metric-val">${c.jobs}</div></div><div class="metric"><div class="metric-label">Next service due</div><div class="metric-val" style="font-size:14px">${c.nextDue?fmtDate(c.nextDue):'\u2014'}</div></div><div class="metric"><div class="metric-label">Lead source</div><div class="metric-val" style="font-size:14px">${c.leadSource||'\u2014'}</div></div></div>
    ${c.isCompany?`<div class="section-title">Company / landlord</div><div class="form-row"><div class="form-group" style="margin-bottom:0"><label>Contact name</label><input type="text" value="${c.contactName||''}" onchange="updateCust(${c.id},'contactName',this.value)"></div><div class="form-group" style="margin-bottom:0"><label>Contact phone</label><input type="tel" value="${c.contactPhone||''}" onchange="updateCust(${c.id},'contactPhone',this.value)"></div></div>`:''}
    <div class="section-title" ${c.isCompany?'style="margin-top:16px"':''}>Customer</div>
    <div class="form-row"><div class="form-group" style="margin-bottom:0"><label>First name</label><input type="text" value="${c.firstName}" onchange="updateCust(${c.id},'firstName',this.value)"></div><div class="form-group" style="margin-bottom:0"><label>Last name</label><input type="text" value="${c.lastName}" onchange="updateCust(${c.id},'lastName',this.value)"></div></div>
    <div class="form-row" style="margin-top:12px"><div class="form-group" style="margin-bottom:0"><label>Phone</label><input type="tel" value="${c.phone}" onchange="updateCust(${c.id},'phone',this.value)"></div><div class="form-group" style="margin-bottom:0"><label>Second phone</label><input type="tel" value="${c.phone2||''}" onchange="updateCust(${c.id},'phone2',this.value)" placeholder="\u2014"></div></div>
    <div class="form-group" style="margin-top:12px"><label>Email</label><input type="email" value="${c.email}" onchange="updateCust(${c.id},'email',this.value)"></div>
    <div class="form-group"><label>Address</label><input type="text" value="${c.address}" onchange="updateCust(${c.id},'address',this.value)"></div>
    <div class="form-group"><label>Notes</label><textarea onchange="updateCust(${c.id},'notes',this.value)">${c.notes}</textarea></div>
    <div class="section-title">Service history</div>
    ${cJobs.length?cJobs.sort((a,b)=>a.date>b.date?-1:1).map(j=>`<div class="history-item"><div class="dot ${j.status==='completed'?'':'amber'}"></div><div><div style="font-size:13px;font-weight:500">${fmtDate(j.date)} \u2014 ${j.services.map(s=>SERVICES.find(x=>x.id===s)?.name||s).join(', ')}</div><div style="font-size:12px;color:var(--color-text-secondary)">${j.status}${j.total?' \u00b7 $'+j.total:''}${j.payment?' \u00b7 '+j.payment:''}${j.photos&&j.photos.length?' \u00b7 '+j.photos.length+' photo'+(j.photos.length>1?'s':''):''}</div>${j.techNotes?`<div style="font-size:12px;color:var(--color-text-secondary);margin-top:2px">${j.techNotes}</div>`:''}</div></div>`).join(''):'<p style="font-size:13px;color:var(--color-text-secondary)">No service history yet</p>'}
  </div>
  <div class="modal-footer"><button class="btn" onclick="closeModal()">Close</button><button class="btn btn-primary" onclick="closeModal();openScheduleJobForCustomer(${id})"><i class="ti ti-calendar-plus"></i> Book job</button></div>`);
}

function openScheduleJob(prefillId){
  const custOpts=customers.map(c=>`<option value="${c.id}" ${prefillId===c.id?'selected':''}>${nameOf(c)}${c.isCompany&&c.contactName?' ('+c.contactName+')':''}</option>`).join('');
  const pre=prefillId?customers.find(c=>c.id===prefillId):null;
  const preServ=pre?pre.serviceRequested||[]:[];
  showModal(`<div class="modal-header"><h3 style="font-size:15px;font-weight:500">Schedule job</h3><button class="btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="form-row"><div class="form-group"><label>Customer</label><select id="sj-cust"><option value="">\u2014 select \u2014</option>${custOpts}</select></div><div class="form-group"><label>Or <span style="color:var(--color-text-info);cursor:pointer" onclick="closeModal();openNewCustomer()">add new customer \u2197</span></label><div style="height:36px"></div></div></div><div class="form-row"><div class="form-group"><label>Date</label><input type="date" id="sj-date" value="${dOff(1)}"></div><div class="form-group"><label>Start time (2-hr slot, double-booking ok)</label><input type="time" id="sj-time" value="10:00"></div></div><div class="section-title">Services</div>${SERVICES.map(s=>`<div class="service-item"><input type="checkbox" id="svc-${s.id}" ${preServ.includes(s.id)?'checked':''}><label for="svc-${s.id}" style="font-size:13px;color:var(--color-text-primary);cursor:pointer;margin:0">${s.name}</label></div>`).join('')}<div class="surcharge-box" style="margin-top:10px"><input type="checkbox" id="sj-surcharge" style="width:auto"><label>Above 2nd floor surcharge</label><input type="number" id="sj-surcharge-amt" placeholder="$0" style="width:80px;background:var(--color-background-primary)"></div><div class="section-title">Products</div>${PRODUCTS.map(p=>`<div class="service-item"><input type="checkbox" id="prd-${p.id}"><label for="prd-${p.id}" style="font-size:13px;color:var(--color-text-primary);cursor:pointer;margin:0">${p.name}</label></div>`).join('')}<div class="form-group" style="margin-top:12px"><label>Job notes</label><textarea id="sj-notes" placeholder="Access notes, customer requests...">${pre?pre.notes||'':''}</textarea></div></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveJob()"><i class="ti ti-calendar-check"></i> Schedule & send confirmation</button></div>`);
}
function openScheduleJobForCustomer(id){openScheduleJob(id);}
function saveJob(){
  const custId=parseInt(document.getElementById('sj-cust').value);if(!custId)return toast('Please select a customer');
  const cust=customers.find(c=>c.id===custId);
  const services=SERVICES.filter(s=>document.getElementById('svc-'+s.id)?.checked).map(s=>s.id);if(!services.length)return toast('Please select at least one service');
  const products=PRODUCTS.filter(p=>document.getElementById('prd-'+p.id)?.checked).map(p=>p.id);
  jobs.push({id:nextJobId++,customerId:custId,customerName:nameOf(cust),date:document.getElementById('sj-date').value,time:document.getElementById('sj-time').value,status:'scheduled',services,products,surcharge:document.getElementById('sj-surcharge').checked,surchargeAmt:parseFloat(document.getElementById('sj-surcharge-amt').value)||0,total:0,payment:'',notes:document.getElementById('sj-notes').value,techNotes:'',photos:[],nextServiceMonths:12});
  reminders=reminders.filter(r=>r.customerId!==custId);cust.snoozeUntil='';
  closeModal();toast(`Job booked \u00b7 Confirmation email sent to ${cust.email||nameOf(cust)}`);showView('jobs');
}

function openJob(id){const j=jobs.find(x=>x.id===id);if(!j)return;if(j.status==='completed'){openCompletedJob(j);return;}openCompleteJob(id);}
function money(n){return '$'+(Number(n)||0).toFixed(2);}
function invRow(name,amt){return '<tr><td style="padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary)">'+name+'</td><td style="padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);text-align:right">'+money(amt)+'</td></tr>';}
function openInvoice(id){
  const j=jobs.find(x=>x.id===id);if(!j)return;
  const c=customers.find(x=>x.id===j.customerId)||{};
  const paid=j.payment&&j.payment!=='Invoice';
  const docType=paid?'RECEIPT':'INVOICE';
  let rows='';let subtotal=0;
  (j.services||[]).forEach(function(sid){const s=SERVICES.find(function(x){return x.id===sid;});if(s){subtotal+=s.price||0;rows+=invRow(s.name,s.price||0);}});
  (j.products||[]).forEach(function(pid){const p=PRODUCTS.find(function(x){return x.id===pid;});if(p){subtotal+=p.price||0;rows+=invRow(p.name,p.price||0);}});
  if(j.surchargeAmt){subtotal+=j.surchargeAmt;rows+=invRow('Above 2nd floor surcharge',j.surchargeAmt);}
  const discount=j.discount||0;
  const total=(typeof j.total==='number'&&j.total)?j.total:Math.max(0,subtotal-discount);
  const invNo='KV-'+(j.date||'').replace(/-/g,'')+'-'+String(j.id).padStart(3,'0');
  const billName=((c.firstName||'')+' '+(c.lastName||'')).trim()||c.contactName||j.customerName;
  const statusBox=paid
    ? '<div style="background:#EAF3DE;border:1px solid #97C459;border-radius:8px;padding:12px 14px;color:#3B6D11"><strong>PAID</strong> \u00b7 '+j.payment+'</div>'
    : '<div style="background:#FAEEDA;border:1px solid #EF9F27;border-radius:8px;padding:12px 14px;color:#854F0B"><strong>BALANCE DUE: '+money(total)+'</strong><div style="font-size:12px;margin-top:4px">Payment options: Cash, Check, Venmo, Zelle, CashApp</div></div>';
  showModal(`
  <div class="modal-header no-print"><h3 style="font-size:15px;font-weight:500">${docType}</h3><button class="btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
  <div class="modal-body" id="invoice-doc" style="background:#fff">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;border-bottom:2px solid var(--color-text-primary);padding-bottom:14px;margin-bottom:14px">
      <div style="display:flex;gap:12px;align-items:center"><img src="${LOGO_SRC}" style="width:56px;height:56px;border-radius:50%;object-fit:cover"><div><div style="font-weight:700;font-size:15px">Klean Ventz</div><div style="font-size:11px;color:var(--color-text-secondary)">Dryer Vent Cleaning &amp; Installation LLC</div><div style="font-size:11px;color:var(--color-text-secondary)">732-808-3637 \u00b7 kleanventz.com</div></div></div>
      <div style="text-align:right"><div style="font-size:22px;font-weight:700;letter-spacing:.05em">${docType}</div><div style="font-size:11px;color:var(--color-text-secondary)">No. ${invNo}</div><div style="font-size:11px;color:var(--color-text-secondary)">${fmtDate(j.date)}</div></div>
    </div>
    <div style="display:flex;justify-content:space-between;gap:16px;margin-bottom:16px;font-size:12px">
      <div><div style="font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;font-size:10px;letter-spacing:.05em;margin-bottom:4px">Bill to</div><div style="font-weight:500;font-size:13px">${billName}</div>${c.isCompany&&c.contactName?`<div>${c.contactName}</div>`:''}<div>${c.address||''}</div><div>${c.phone||''}</div><div>${c.email||''}</div></div>
      <div style="text-align:right"><div style="font-weight:600;color:var(--color-text-secondary);text-transform:uppercase;font-size:10px;letter-spacing:.05em;margin-bottom:4px">Service date</div><div>${fmtDate(j.date)} ${j.time||''}</div></div>
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px"><thead><tr><th style="text-align:left;border-bottom:1px solid var(--color-border-secondary);padding:6px 0">Description</th><th style="text-align:right;border-bottom:1px solid var(--color-border-secondary);padding:6px 0">Amount</th></tr></thead><tbody>${rows||'<tr><td style="padding:6px 0;color:var(--color-text-secondary)">No items recorded</td><td></td></tr>'}</tbody></table>
    <div style="margin-left:auto;width:230px;font-size:13px">
      <div style="display:flex;justify-content:space-between;padding:3px 0"><span style="color:var(--color-text-secondary)">Subtotal</span><span>${money(subtotal)}</span></div>
      ${discount?`<div style="display:flex;justify-content:space-between;padding:3px 0;color:#A32D2D"><span>Discount${j.discountReason?' ('+j.discountReason+')':''}</span><span>-${money(discount)}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--color-border-secondary);font-weight:700;font-size:15px"><span>Total</span><span>${money(total)}</span></div>
    </div>
    <div style="margin-top:16px">${statusBox}</div>
    ${j.techNotes?`<div style="margin-top:14px;font-size:12px;color:var(--color-text-secondary)"><strong style="color:var(--color-text-primary)">Notes:</strong> ${j.techNotes}</div>`:''}
    <div style="margin-top:18px;padding-top:14px;border-top:0.5px solid var(--color-border-tertiary);text-align:center;font-size:12px;color:var(--color-text-secondary)">Thank you for your business! We'd love a review:<br><span style="color:var(--color-text-info);word-break:break-all">${GOOGLE_REVIEW_URL}</span></div>
  </div>
  <div class="modal-footer no-print"><button class="btn" onclick="closeModal()">Close</button><button class="btn btn-primary" onclick="window.print()"><i class="ti ti-printer"></i> Print / Save as PDF</button></div>`);
}
function openCompletedJob(j){const cc=customers.find(x=>x.id===j.customerId)||{};showModal(`<div class="modal-header"><h3 style="font-size:15px;font-weight:500">Completed \u2014 ${j.customerName}</h3><button class="btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div class="grid2" style="margin-bottom:16px"><div class="metric"><div class="metric-label">Date</div><div class="metric-val" style="font-size:14px">${fmtDate(j.date)} ${j.time}</div></div><div class="metric"><div class="metric-label">Total collected</div><div class="metric-val">$${j.total}</div></div></div><p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px"><i class="ti ti-map-pin"></i> ${cc.address||'No address on file'}${cc.phone?' \u00b7 '+cc.phone:''}</p><p style="font-size:13px;margin-bottom:8px"><strong>Services:</strong> ${j.services.map(s=>SERVICES.find(x=>x.id===s)?.name||s).join(', ')}</p>${j.products.length?`<p style="font-size:13px;margin-bottom:8px"><strong>Products:</strong> ${j.products.map(p=>PRODUCTS.find(x=>x.id===p)?.name||p).join(', ')}</p>`:''}${j.discount?`<p style="font-size:13px;margin-bottom:8px"><strong>Discount:</strong> -$${j.discount}${j.discountReason?' ('+j.discountReason+')':''}</p>`:''}${j.techNotes?`<p style="font-size:13px;margin-bottom:8px"><strong>Tech notes:</strong> ${j.techNotes}</p>`:''}${j.photos&&j.photos.length?`<p style="font-size:13px;margin-bottom:8px"><strong>Photos:</strong> ${j.photos.join(', ')}</p>`:''}<p style="font-size:13px;margin-bottom:8px"><strong>Payment:</strong> ${j.payment||'\u2014'}</p><p style="font-size:13px"><strong>Next service due:</strong> ${j.nextServiceMonths} months</p><div style="margin-top:16px;padding:12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-secondary)"><span style="font-weight:500;color:var(--color-text-primary)">Sent automatically:</span> ${j.payment&&j.payment!=='Invoice'?'Receipt':'Invoice'} + Google review request</div></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Close</button><button class="btn btn-primary" onclick="openInvoice(${j.id})"><i class="ti ti-file-invoice"></i> View invoice / receipt</button></div>`);}
function openCompleteJob(id){const j=jobs.find(x=>x.id===id);if(!j)return;selectedPayment='';const cc=customers.find(x=>x.id===j.customerId)||{};showModal(`<div class="modal-header"><h3 style="font-size:15px;font-weight:500">Complete job \u2014 ${j.customerName}</h3><button class="btn" onclick="closeModal()"><i class="ti ti-x"></i></button></div><div class="modal-body"><div style="background:#EAF3DE;border:0.5px solid #97C459;border-radius:var(--border-radius-md);padding:10px 14px;margin-bottom:16px;font-size:13px;color:#3B6D11"><i class="ti ti-calendar-check" style="font-size:15px;vertical-align:-2px;margin-right:6px"></i>${fmtDate(j.date)} at ${j.time} \u00b7 ${j.customerName}</div><div style="font-size:13px;color:var(--color-text-secondary);margin:-8px 0 14px"><i class="ti ti-map-pin"></i> ${cc.address||'No address on file'}${cc.phone?' \u00b7 '+cc.phone:''}</div><div class="section-title">Services performed</div>${SERVICES.map(s=>`<div class="service-item"><input type="checkbox" id="cs-${s.id}" ${j.services.includes(s.id)?'checked':''}><label for="cs-${s.id}" style="font-size:13px;color:var(--color-text-primary);cursor:pointer;margin:0">${s.name}</label></div>`).join('')}<div class="surcharge-box" style="margin-top:10px"><input type="checkbox" id="cs-surcharge" ${j.surcharge?'checked':''} style="width:auto"><label>Above 2nd floor surcharge</label><input type="number" id="cs-surcharge-amt" value="${j.surchargeAmt||''}" placeholder="$0" style="width:80px;background:var(--color-background-primary)"></div><div class="section-title" style="margin-top:12px">Products sold</div>${PRODUCTS.map(p=>`<div class="service-item"><input type="checkbox" id="cp-${p.id}" ${j.products.includes(p.id)?'checked':''}><label for="cp-${p.id}" style="font-size:13px;color:var(--color-text-primary);cursor:pointer;margin:0">${p.name}</label><input type="number" placeholder="qty" style="width:52px;margin-left:auto"></div>`).join('')}<div class="form-group" style="margin-top:12px"><label>Technician notes</label><textarea id="cs-notes" placeholder="Blockage found, condition, anything notable...">${j.techNotes}</textarea></div><div class="form-group"><label>Photos <span class="optional-tag">optional</span></label><input type="file" id="cs-photos" accept="image/*" multiple></div><div class="form-group"><label>Job total ($) <span class="optional-tag">auto-totaled from your catalog \u2014 editable</span></label><input type="number" id="cs-total" value="${j.total||jobCharge(j)}" placeholder="0.00" oninput="updateNet()"></div><div class="form-row"><div class="form-group" style="margin-bottom:0"><label>Discount ($) <span class="optional-tag">optional</span></label><input type="number" id="cs-discount" value="${j.discount||''}" placeholder="0.00" oninput="updateNet()"></div><div class="form-group" style="margin-bottom:0"><label>Discount reason</label><input type="text" id="cs-discount-reason" value="${(j.discountReason||'').replace(/"/g,'&quot;')}" placeholder="e.g. repeat customer, senior"></div></div><div style="font-size:13px;color:var(--color-text-secondary);margin:-2px 0 12px">Customer pays: <strong id="cs-net" style="color:var(--color-text-primary)">$${Math.max(0,((j.total||jobCharge(j))-(j.discount||0))).toFixed(2)}</strong></div><div class="form-group"><label>Recommended next service</label><select id="cs-next">${NEXT_SERVICE.map(m=>`<option value="${m}" ${j.nextServiceMonths===m?'selected':''}>${m} months</option>`).join('')}</select></div><div class="section-title">Payment collected</div><div class="payment-opts">${PAYMENT_METHODS.map(m=>`<div class="payment-opt" id="pay-${m}" onclick="selectPay('${m}')">${m}</div>`).join('')}</div><p style="font-size:12px;color:var(--color-text-secondary);margin-top:8px">Leave unselected to send an invoice instead of a receipt (collect payment later from the office, then complete).</p></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-success" onclick="completeJob(${id})"><i class="ti ti-check"></i> Complete & send</button></div>`);}
function selectPay(m){selectedPayment=m;document.querySelectorAll('.payment-opt').forEach(el=>el.classList.remove('selected'));const el=document.getElementById('pay-'+m);if(el)el.classList.add('selected');}
function updateNet(){var t=parseFloat(document.getElementById('cs-total').value)||0;var d=parseFloat(document.getElementById('cs-discount').value)||0;var el=document.getElementById('cs-net');if(el)el.textContent='$'+Math.max(0,(t-d)).toFixed(2);}
function completeJob(id){const j=jobs.find(x=>x.id===id);if(!j)return;j.services=SERVICES.filter(s=>document.getElementById('cs-'+s.id)?.checked).map(s=>s.id);j.products=PRODUCTS.filter(p=>document.getElementById('cp-'+p.id)?.checked).map(p=>p.id);j.surcharge=document.getElementById('cs-surcharge').checked;j.surchargeAmt=parseFloat(document.getElementById('cs-surcharge-amt').value)||0;j.discount=parseFloat(document.getElementById('cs-discount').value)||0;j.discountReason=document.getElementById('cs-discount-reason').value;j.total=Math.max(0,(parseFloat(document.getElementById('cs-total').value)||0)-j.discount);j.payment=selectedPayment;j.techNotes=document.getElementById('cs-notes').value;const pf=document.getElementById('cs-photos');j.photos=pf&&pf.files?Array.from(pf.files).map(f=>f.name):[];j.nextServiceMonths=parseInt(document.getElementById('cs-next').value)||12;j.status='completed';const cust=customers.find(c=>c.id===j.customerId);if(cust){cust.lastService=j.date;cust.jobs=(cust.jobs||0)+1;cust.snoozeUntil='';cust.nextServiceMonths=j.nextServiceMonths;const nd=new Date(j.date);nd.setMonth(nd.getMonth()+j.nextServiceMonths);cust.nextDue=nd.toISOString().slice(0,10);}reminders=reminders.filter(r=>r.customerId!==j.customerId);closeModal();toast(selectedPayment&&selectedPayment!=='Invoice'?'Complete \u00b7 Receipt & review request sent':'Complete \u00b7 Invoice & review request sent');showView('jobs');}
function updateCust(id,field,val){const c=customers.find(x=>x.id===id);if(c)c[field]=val;}
function showModal(html){document.getElementById('modal-container').innerHTML=`<div class="modal-bg" onclick="bgClose(event)"><div class="modal">${html}</div></div>`;}
function closeModal(){document.getElementById('modal-container').innerHTML='';}
function bgClose(e){if(e.target.classList.contains('modal-bg'))closeModal();}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200);}
function initials(c){return (((c.firstName||c.contactName||'?')[0]||'')+((c.lastName||'')[0]||'')).toUpperCase();}
function fmtDate(d){if(!d)return'\u2014';const p=d.split('-');const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return months[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0];}
function statusBadge(s){return{scheduled:'badge-blue',completed:'badge-green'}[s]||'badge-gray';}
